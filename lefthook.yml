pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{js,mjs,cjs,ts,mts,cts,vue}'
      run: pnpm oxlint {staged_files} --fix

    eslint:
      glob: '*.{js,mjs,cjs,ts,mts,cts,vue,json,jsonc}'
      run: pnpm eslint {staged_files} --fix --no-error-on-unmatched-pattern --no-warn-ignored

    stylelint:
      glob: 'packages/**/*.css'
      run: pnpm stylelint {staged_files} --fix --allow-empty-input

    prettier:
      glob: '*.{js,mjs,cjs,ts,mts,cts,vue,json,jsonc,css,scss,md,yml,yaml,html,htm,java,go}'
      skip_empty: true
      run: pnpm oxfmt {staged_files} --write --no-error-on-unmatched-pattern
